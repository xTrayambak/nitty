[package]
name = "nitty"
description = "A fast terminal emulator written in Nim"
version = "0.2.1"
license = "BSD3"
kind = "Binary"
backend = "C"
binaries = ["nitty"]

[toolchain]
version = "2.2.0"

[dependencies]
pixie = ">= 5.1.0"
shakar = ">= 0.1.3"
surfer = ">= 0.2.1"
xkb = ">= 1.4.1"
vmath = ">= 2.0.1"
chronicles = ">= 0.12.3"
ybus = ">= 0.1.1"
nanovg = ">= 0.3.4"
parsetoml = ">= 0.7.2"
chroma = ">= 1.0.0"

[platforms.native]
include = ["wayland-egl", "wayland-egl-backend", "glesv2", "egl", "vterm", "fontconfig", "simdutf", "xkbcommon"]
link = ["wayland-egl", "wayland-egl-backend", "glesv2", "egl", "vterm", "fontconfig", "simdutf", "xkbcommon"]
